# Trigger → User-defined substitutions: задайте _PUBLIC_URL = https://ВАШАТА-услуга.run.app (без / накрая).
substitutions:
  _REGION: europe-west1
  _AR_REPO: apps
  _SERVICE: smolyanklima
  _PUBLIC_URL: "https://YOUR-SERVICE-XXXX.europe-west1.run.app"

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/smolyanklima:${SHORT_SHA}",
        ".",
      ]

  - name: gcr.io/cloud-builders/docker
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/smolyanklima:${SHORT_SHA}",
      ]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "${_SERVICE}",
        "--image",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/smolyanklima:${SHORT_SHA}",
        "--region",
        "${_REGION}",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--port",
        "8080",
        "--set-env-vars",
        "NODE_ENV=production,FRONTEND_ORIGIN=${_PUBLIC_URL},APP_URL=${_PUBLIC_URL}",
        "--set-secrets",
        "SUPABASE_URL=SUPABASE_URL:latest",
        "--set-secrets",
        "SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest",
        "--set-secrets",
        "SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest",
        "--set-secrets",
        "GEMINI_API_KEY=GEMINI_API_KEY:latest",
        "--set-secrets",
        "CLOUDINARY_URL=CLOUDINARY_URL:latest",
        "--set-secrets",
        "RESEND_API_KEY=RESEND_API_KEY:latest",
      ]

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/smolyanklima:${SHORT_SHA}"

