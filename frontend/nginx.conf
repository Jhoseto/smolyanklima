# Само за ОТДЕЛЕН frontend контейнер. SPA вика /api на СЪЩИЯ host — без proxy тук /api НЕ стига до Next.js.
# Препоръка за production: един service от repo root Dockerfile (Next + static SPA).
server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers (frontend)
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively (hashed by Vite)
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }
}

