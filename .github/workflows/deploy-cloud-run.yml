# Production deploy по подразбиране: Cloud Build trigger от GitHub (вижте DEPLOY_CLOUD_RUN.md).
# Този workflow е само за ръчно пускане, ако ползвате GitHub Actions + WIF (без Cloud Build).

name: Deploy (Cloud Run)

on:
  workflow_dispatch:

concurrency:
  group: cloud-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      REGION: ${{ secrets.GCP_REGION }}
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      # Ясна грешка вместо съобщението на google-github-actions/auth за липсващ WIF
      - name: Require Workload Identity secrets
        env:
          WIF: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SA: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          if [ -z "${WIF}" ] || [ -z "${SA}" ]; then
            echo "::error::Липсват GitHub Secrets: GCP_WORKLOAD_IDENTITY_PROVIDER и/или GCP_SERVICE_ACCOUNT."
            echo "Настройте WIF в GitHub (repo → Settings → Secrets → Actions) ИЛИ не ползвайте този workflow — production deploy е през Cloud Build trigger (вижте DEPLOY_CLOUD_RUN.md)."
            exit 1
          fi

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build & push unified image
        env:
          IMAGE: gcr.io/${{ env.PROJECT_ID }}/smolyanklima:${{ github.sha }}
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run (unified)
        env:
          SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
          IMAGE: gcr.io/${{ env.PROJECT_ID }}/smolyanklima:${{ github.sha }}
          ORIGIN: ${{ secrets.PROD_FRONTEND_ORIGIN }}
          NOTIFY_TO: ${{ secrets.PROD_NOTIFY_EMAIL_TO }}
          NOTIFY_FROM: ${{ secrets.PROD_NOTIFY_EMAIL_FROM }}
        run: |
          set -euo pipefail
          ENV_VARS="NODE_ENV=production,FRONTEND_ORIGIN=${ORIGIN},APP_URL=${ORIGIN}"
          if [ -n "${NOTIFY_TO:-}" ]; then ENV_VARS="${ENV_VARS},NOTIFY_EMAIL_TO=${NOTIFY_TO}"; fi
          if [ -n "${NOTIFY_FROM:-}" ]; then ENV_VARS="${ENV_VARS},NOTIFY_EMAIL_FROM=${NOTIFY_FROM}"; fi
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "$ENV_VARS" \
            --set-secrets "SUPABASE_URL=${{ secrets.SECRET_SUPABASE_URL }}:latest" \
            --set-secrets "SUPABASE_ANON_KEY=${{ secrets.SECRET_SUPABASE_ANON_KEY }}:latest" \
            --set-secrets "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SECRET_SUPABASE_SERVICE_ROLE_KEY }}:latest" \
            --set-secrets "GEMINI_API_KEY=${{ secrets.SECRET_GEMINI_API_KEY }}:latest" \
            --set-secrets "CLOUDINARY_URL=${{ secrets.SECRET_CLOUDINARY_URL }}:latest"
