# Unified Cloud Run deploy: един контейнер = Vite SPA (static) + Next.js API/админ.
# Локална разработка: frontend (Vite) :3000 с proxy на /api към Next.js :3001 — вижте vite.config.ts.
#
# Изисква GitHub Secrets (WIF + GCP). Име на услуга: CLOUD_RUN_SERVICE (напр. smolyanklima).
# PROD_FRONTEND_ORIGIN = публичният HTTPS URL на същата Cloud Run услуга (без trailing slash).

name: Deploy (Cloud Run)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: cloud-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      REGION: ${{ secrets.GCP_REGION }}
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      AR_REPO: ${{ secrets.GCP_ARTIFACT_REPO }}

    steps:
      - uses: actions/checkout@v4

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push unified image
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/smolyanklima:${{ github.sha }}
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run (unified)
        env:
          SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/smolyanklima:${{ github.sha }}
          ORIGIN: ${{ secrets.PROD_FRONTEND_ORIGIN }}
          NOTIFY_TO: ${{ secrets.PROD_NOTIFY_EMAIL_TO }}
          NOTIFY_FROM: ${{ secrets.PROD_NOTIFY_EMAIL_FROM }}
        run: |
          set -euo pipefail
          ENV_VARS="NODE_ENV=production,FRONTEND_ORIGIN=${ORIGIN},APP_URL=${ORIGIN}"
          if [ -n "${NOTIFY_TO:-}" ]; then ENV_VARS="${ENV_VARS},NOTIFY_EMAIL_TO=${NOTIFY_TO}"; fi
          if [ -n "${NOTIFY_FROM:-}" ]; then ENV_VARS="${ENV_VARS},NOTIFY_EMAIL_FROM=${NOTIFY_FROM}"; fi
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "$ENV_VARS" \
            --set-secrets "SUPABASE_URL=${{ secrets.SECRET_SUPABASE_URL }}:latest" \
            --set-secrets "SUPABASE_ANON_KEY=${{ secrets.SECRET_SUPABASE_ANON_KEY }}:latest" \
            --set-secrets "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SECRET_SUPABASE_SERVICE_ROLE_KEY }}:latest" \
            --set-secrets "GEMINI_API_KEY=${{ secrets.SECRET_GEMINI_API_KEY }}:latest" \
            --set-secrets "CLOUDINARY_URL=${{ secrets.SECRET_CLOUDINARY_URL }}:latest" \
            --set-secrets "RESEND_API_KEY=${{ secrets.SECRET_RESEND_API_KEY }}:latest"
