name: Deploy (Cloud Run)

on:
  push:
    branches: [main, master]

concurrency:
  group: cloud-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      REGION: ${{ secrets.GCP_REGION }}
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      AR_REPO: ${{ secrets.GCP_ARTIFACT_REPO }}

    steps:
      - uses: actions/checkout@v4

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ─────────────────────────────────────────────
      # Backend
      # ─────────────────────────────────────────────
      - name: Build & push backend image
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/smolyanklima-backend:${{ github.sha }}
        run: |
          docker build -f backend/Dockerfile -t "$IMAGE" backend
          docker push "$IMAGE"

      - name: Deploy backend to Cloud Run
        env:
          SERVICE: ${{ secrets.CLOUD_RUN_BACKEND_SERVICE }}
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/smolyanklima-backend:${{ github.sha }}
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 3001 \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "FRONTEND_ORIGIN=${{ secrets.PROD_FRONTEND_ORIGIN }}" \
            --set-env-vars "APP_URL=${{ secrets.PROD_BACKEND_ORIGIN }}" \
            --set-secrets "SUPABASE_URL=${{ secrets.SECRET_SUPABASE_URL }}:latest" \
            --set-secrets "SUPABASE_ANON_KEY=${{ secrets.SECRET_SUPABASE_ANON_KEY }}:latest" \
            --set-secrets "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SECRET_SUPABASE_SERVICE_ROLE_KEY }}:latest" \
            --set-secrets "GEMINI_API_KEY=${{ secrets.SECRET_GEMINI_API_KEY }}:latest" \
            --set-secrets "CLOUDINARY_URL=${{ secrets.SECRET_CLOUDINARY_URL }}:latest" \
            --set-secrets "RESEND_API_KEY=${{ secrets.SECRET_RESEND_API_KEY }}:latest" \
            --set-env-vars "NOTIFY_EMAIL_TO=${{ secrets.PROD_NOTIFY_EMAIL_TO }}" \
            --set-env-vars "NOTIFY_EMAIL_FROM=${{ secrets.PROD_NOTIFY_EMAIL_FROM }}"

      # ─────────────────────────────────────────────
      # Frontend
      # ─────────────────────────────────────────────
      - name: Build & push frontend image
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/smolyanklima-frontend:${{ github.sha }}
        run: |
          docker build -f frontend/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy frontend to Cloud Run
        env:
          SERVICE: ${{ secrets.CLOUD_RUN_FRONTEND_SERVICE }}
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/smolyanklima-frontend:${{ github.sha }}
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "NODE_ENV=production"

